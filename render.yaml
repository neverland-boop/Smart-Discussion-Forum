databases:
  - name: smartforum-db
    databaseName: smartforum
    user: db_user
    plan: free

services:
  - type: web
    name: smart-discussion-forum-backend
    runtime: docker
    plan: free
    rootDir: backend
    buildCommand: "composer install --no-dev --optimize-autoloader"
    startCommand: "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=10000"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: smartforum-db
          property: connectionString
