databases:
  - name: smartforum-db
    databaseName: smartforum
    user: db_user
    plan: free

services:
  - type: web
    name: smart-discussion-forum-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: smartforum-db
          property: connectionString
